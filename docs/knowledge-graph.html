<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python 知识图谱</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
    background: #1a1a2e;
    color: #eee;
    overflow: hidden;
  }
  #graph { width: 100vw; height: 100vh; }
  .node { cursor: pointer; }
  .node rect { fill: #16213e; stroke: #0f3460; stroke-width: 2; rx: 8; }
  .node text { fill: #fff; font-size: 12px; text-anchor: middle; dominant-baseline: middle; }
  .node:hover rect { stroke: #e94560; }
  .link { stroke: #0f3460; stroke-width: 1.5; opacity: 0.6; }
  .link:hover { stroke: #e94560; opacity: 1; }
  #info {
    position: fixed; top: 20px; left: 20px;
    background: rgba(22,33,62,0.9);
    padding: 15px 20px; border-radius: 10px;
    max-width: 300px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  #info h2 { color: #e94560; margin-bottom: 10px; font-size: 18px; }
  #info p { color: #aaa; font-size: 13px; line-height: 1.6; }
  #legend {
    position: fixed; bottom: 20px; left: 20px;
    background: rgba(22,33,62,0.9);
    padding: 12px 16px; border-radius: 8px;
    font-size: 12px;
  }
  .legend-item { display: flex; align-items: center; margin: 6px 0; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; margin-right: 8px; }
  .dot-day { background: #e94560; }
  .dot-chapter { background: #0f3460; }
  .dot-project { background: #533483; }
  .dot-appendix { background: #16213e; border: 1px solid #e94560; }
</style>
</head>
<body>
<div id="graph"></div>
<div id="info">
  <h2>Python 知识图谱</h2>
  <p>拖拽节点移动位置<br>滚轮缩放<br>点击节点查看详情</p>
</div>
<div id="legend">
  <div class="legend-item"><div class="legend-dot dot-day"></div>每日笔记</div>
  <div class="legend-item"><div class="legend-dot dot-chapter"></div>章节</div>
  <div class="legend-item"><div class="legend-dot dot-project"></div>项目</div>
  <div class="legend-item"><div class="legend-dot dot-appendix"></div>附录</div>
</div>

<script>
const nodes = [
  // Daily Notes (左侧)
  {id: "d1", label: "Day 1\n基础入门", group: "day", x: 100, y: 80},
  {id: "d2", label: "Day 2\n循环与函数", group: "day", x: 100, y: 180},
  {id: "d3", label: "Day 3\n文件与异常", group: "day", x: 100, y: 280},
  {id: "d4", label: "Day 4\nJSON与存储", group: "day", x: 100, y: 380},

  // Chapters 1-4 (上排)
  {id: "c1", label: "第1章\n起步", group: "chapter", x: 350, y: 80},
  {id: "c2", label: "第2章\n变量", group: "chapter", x: 500, y: 80},
  {id: "c3", label: "第3章\n列表", group: "chapter", x: 650, y: 80},
  {id: "c4", label: "第4章\n操作列表", group: "chapter", x: 800, y: 80},

  // Chapters 5-8 (中排)
  {id: "c5", label: "第5章\nif语句", group: "chapter", x: 350, y: 180},
  {id: "c6", label: "第6章\n字典", group: "chapter", x: 500, y: 180},
  {id: "c7", label: "第7章\nwhile循环", group: "chapter", x: 650, y: 180},
  {id: "c8", label: "第8章\n函数", group: "chapter", x: 800, y: 180},

  // Chapters 9-11 (下排)
  {id: "c9", label: "第9章\n类", group: "chapter", x: 350, y: 280},
  {id: "c10", label: "第10章\n文件异常", group: "chapter", x: 500, y: 280},
  {id: "c11", label: "第11章\n测试", group: "chapter", x: 650, y: 280},

  // Projects (右侧)
  {id: "p1", label: "项目1\n外星人入侵", group: "project", x: 950, y: 180},
  {id: "p2", label: "项目2\n数据可视化", group: "project", x: 950, y: 280},
  {id: "p3", label: "项目3\nWeb应用", group: "project", x: 950, y: 380},

  // Appendix (底部)
  {id: "ap", label: "附录", group: "appendix", x: 350, y: 400},
];

const links = [
  // Daily → Chapters
  {source: "d1", target: "c2"},
  {source: "d1", target: "c3"},
  {source: "d2", target: "c7"},
  {source: "d2", target: "c8"},
  {source: "d3", target: "c10"},
  {source: "d4", target: "c10"},

  // Sequential
  {source: "c1", target: "c2"},
  {source: "c2", target: "c3"},
  {source: "c3", target: "c4"},
  {source: "c4", target: "c5"},
  {source: "c5", target: "c6"},
  {source: "c6", target: "c7"},
  {source: "c7", target: "c8"},
  {source: "c8", target: "c9"},
  {source: "c9", target: "c10"},
  {source: "c10", target: "c11"},

  // Cross refs
  {source: "c2", target: "c6"},
  {source: "c5", target: "c7"},
  {source: "c8", target: "c11"},

  // Projects
  {source: "c9", target: "p1"},
  {source: "c10", target: "p2"},
  {source: "c11", target: "p3"},

  // Projects chain
  {source: "p1", target: "p2"},
  {source: "p2", target: "p3"},

  // Appendix
  {source: "c11", target: "ap"},
  {source: "p3", target: "ap"},
];

const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("#graph")
  .append("svg")
  .attr("width", width)
  .attr("height", height);

// Zoom
const g = svg.append("g");
const zoom = d3.zoom().on("zoom", (e) => g.attr("transform", e.transform));
svg.call(zoom);

// Arrow marker
svg.append("defs").append("marker")
  .attr("id", "arrow")
  .attr("viewBox", "0 -5 10 10")
  .attr("refX", 25)
  .attr("refY", 0)
  .attr("markerWidth", 6)
  .attr("markerHeight", 6)
  .attr("orient", "auto")
  .append("path")
  .attr("d", "M0,-5L10,0L0,5")
  .attr("fill", "#0f3460");

// Links
g.selectAll(".link")
  .data(links)
  .enter().append("line")
  .attr("class", "link")
  .attr("x1", d => nodes.find(n => n.id === d.source).x + 40)
  .attr("y1", d => nodes.find(n => n.id === d.source).y + 20)
  .attr("x2", d => nodes.find(n => n.id === d.target).x + 40)
  .attr("y2", d => nodes.find(n => n.id === d.target).y + 20)
  .attr("marker-end", "url(#arrow)");

// Nodes
const node = g.selectAll(".node")
  .data(nodes)
  .enter().append("g")
  .attr("class", "node")
  .attr("transform", d => `translate(${d.x}, ${d.y})`)
  .call(d3.drag()
    .on("start", dragstarted)
    .on("drag", dragged)
    .on("end", dragended))
  .on("click", clicked);

node.append("rect")
  .attr("width", 80)
  .attr("height", 40)
  .attr("fill", d => {
    if (d.group === "day") return "#e94560";
    if (d.group === "project") return "#533483";
    if (d.group === "appendix") return "#16213e";
    return "#0f3460";
  })
  .attr("stroke", "#fff")
  .attr("stroke-width", 1);

node.append("text")
  .selectAll("tspan")
  .data(d => d.label.split("\n"))
  .enter().append("tspan")
  .attr("x", 40)
  .attr("dy", (d, i) => i === 0 ? 18 : 14)
  .text(d => d);

function dragstarted(event, d) {
  d3.select(this).raise();
}
function dragged(event, d) {
  d.x = event.x;
  d.y = event.y;
  d3.select(this).attr("transform", `translate(${d.x}, ${d.y})`);
  updateLinks();
}
function dragended(event, d) {}

function updateLinks() {
  g.selectAll(".link")
    .attr("x1", d => nodes.find(n => n.id === d.source).x + 40)
    .attr("y1", d => nodes.find(n => n.id === d.source).y + 20)
    .attr("x2", d => nodes.find(n => n.id === d.target).x + 40)
    .attr("y2", d => nodes.find(n => n.id === d.target).y + 20);
}

function clicked(event, d) {
  const info = document.getElementById("info");
  const tips = {
    d1: "变量、字符串、数字、注释、类型转换",
    d2: "for循环、while循环、函数定义与调用、参数传递",
    d3: "文件读取、写入、异常处理、JSON",
    d4: "JSON存储、用户数据持久化",
    c1: "搭建Python环境、运行Hello World",
    c2: "变量、字符串方法、f-string、数字类型",
    c3: "列表定义、访问、修改、添加、删除、排序",
    c4: "for循环、range()、列表推导式、元组",
    c5: "if语句、条件测试、布尔值",
    c6: "字典定义、访问、遍历、嵌套",
    c7: "while循环、用户输入、break/continue",
    c8: "函数定义、参数、返回值、模块导入",
    c9: "类定义、__init__、继承、方法",
    c10: "文件读写、异常处理、JSON存储",
    c11: "unittest、pytest、断言、测试用例",
    p1: "Pygame游戏开发：飞船、外星人、子弹",
    p2: "Matplotlib数据可视化：图表、随机漫步",
    p3: "Django Web开发：博客、模板、数据库",
    ap: "Python安装、编辑器、Git版本控制"
  };
  info.innerHTML = `<h2>${d.label.replace("\n", " ")}</h2><p>${tips[d.id] || "点击查看知识点详情"}</p>`;
}

// Center view
svg.call(zoom.transform, d3.zoomIdentity.translate(width/2 - 500, height/2 - 250));
</script>
</body>
</html>
